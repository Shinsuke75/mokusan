<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mokusan - 木材積算アプリ</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1d5a3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="mokusan" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <main class="container">
      <h1>mokusan</h1>
      <p class="lead">木材値札をスキャンして立米単価を記録・積算します。</p>

      <div class="tab-nav">
        <button class="tab-btn active" id="tabScan">📷 スキャン</button>
        <button class="tab-btn" id="tabCalc">📊 計算</button>
        <button class="tab-btn" id="tabList">📋 リスト</button>
      </div>

      <!-- ===== スキャンタブ ===== -->
      <div id="scanContent">
      <section class="card">
        <h2>画像を読み込む</h2>
        <div>
          <span class="field-label">値札画像</span>
          <div class="photo-select">
            <button type="button" id="cameraButton" class="photo-btn">📷 カメラで撮影</button>
            <button type="button" id="galleryButton" class="photo-btn">🖼 写真を選ぶ</button>
          </div>
          <img id="photoPreview" class="photo-preview hidden" alt="選択した画像" />
          <div id="photoName" class="photo-name hidden"></div>
          <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" />
          <input id="galleryInput" type="file" accept="image/*" class="hidden" />
        </div>
        <button id="scanButton" type="button" class="primary">Geminiで解析</button>
        <div id="scanStatus" class="status"></div>
      </section>

      <section class="card hidden" id="confirmSection">
        <h2>抽出結果の確認・修正</h2>
        <div class="grid2">
          <label>樹種<input id="species" /></label>
          <label>
            価格(円)
            <div class="price-row">
              <input id="priceYen" type="number" min="0" />
              <label class="tax-chk"><input type="checkbox" id="taxIncluded" />税込</label>
            </div>
          </label>
          <label>幅(mm)<input id="widthMm" type="number" min="0" /></label>
          <label>厚み(mm)<input id="heightMm" type="number" min="0" /></label>
          <label>長さ(mm)<input id="lengthMm" type="number" min="0" /></label>
          <label class="full">備考<input id="note" /></label>
        </div>
        <div class="resultBox">
          <p>体積: <span id="volumeText">-</span> m³</p>
          <p><span id="unitPriceLabel">立米単価</span>: <span id="unitPriceText">-</span> 円/m³</p>
        </div>
        <div class="meta-section">
          <p class="meta-label">場所（任意）</p>
          <div id="geoStatus" class="status"></div>
          <div id="locationAuto" class="hidden">
            <p><strong>都道府県:</strong> <span id="prefectureText"></span></p>
            <p><strong>市区町村:</strong> <span id="cityText"></span></p>
          </div>
          <div id="locationManual" class="hidden grid2">
            <label>
              都道府県
              <select id="manualPrefecture"></select>
            </label>
            <label>
              市区町村
              <input id="manualCity" placeholder="例: 新宿区" />
            </label>
          </div>
        </div>
        <label class="consent-label">
          <input type="checkbox" id="shareConsent" checked />
          位置情報・価格データを「みんなの記録」に共有する
          （任意。外すとローカルのリストにのみ追加されます）
          ／<a href="/privacy.html" target="_blank" rel="noopener noreferrer">プライバシーポリシー</a>
        </label>
        <button id="addScanToListButton" type="button" class="primary">＋ リストに追加</button>
        <div id="submitStatus" class="status"></div>
      </section>

      <section class="card hidden" id="doneSection">
        <h2>完了</h2>
        <p>価格表に追加しました。ありがとうございます！</p>
      </section>
      </div>

      <!-- ===== 計算タブ ===== -->
      <div id="calcContent" class="hidden">
        <section class="card">
          <h2>積算計算</h2>
          <div class="grid2">
            <div class="field">
              <span class="field-label">樹種</span>
              <input id="calcSpecies" placeholder="例: スギ（製材品）" />
              <div id="myPriceChips" class="chips"></div>
            </div>
            <label class="full">
              立米単価 (円/m³)
              <input id="calcUnitPrice" type="number" min="0" placeholder="単価を入力" />
              <span id="unitPriceSource" class="hint-text"></span>
            </label>
            <label>幅(mm)<input id="calcWidth" type="number" min="0" /></label>
            <label>厚み(mm)<input id="calcHeight" type="number" min="0" /></label>
            <label>長さ(mm)<input id="calcLength" type="number" min="0" /></label>
            <label>本数・枚数<input id="calcQty" type="number" min="1" value="1" /></label>
          </div>
          <div class="resultBox">
            <p>体積: <span id="calcVolume">-</span> m³</p>
            <p>金額: <strong><span id="calcPrice">-</span> 円</strong></p>
          </div>
          <button id="addToListButton" type="button" class="secondary">＋ リストに追加</button>
        </section>

        <section class="card">
          <h2>みんなの記録</h2>
          <div id="recentStatus" class="status">読み込み中...</div>
          <div id="recentTable"></div>
        </section>
      </div>

      <!-- ===== リストタブ ===== -->
      <div id="listContent" class="hidden">
        <section class="card">
          <h2>リスト</h2>
          <p id="listEmpty" class="status">リストは空です。「計算」タブから追加してください。</p>
          <div id="listTable"></div>
          <div id="listTotal" class="resultBox hidden">
            <p>合計体積: <span id="totalVolume">-</span> m³</p>
            <p>合計金額: <strong><span id="totalPrice">-</span> 円</strong></p>
          </div>
          <button id="shareButton" type="button" class="primary hidden">リストを送る</button>
          <button id="resetListButton" type="button" class="secondary hidden">初期値に戻す</button>
          <button id="clearListButton" type="button" class="danger hidden">リストをすべて削除</button>
        </section>
      </div>

    </main>

    <div id="undoToast" class="undo-toast hidden">
      <span id="undoMessage"></span>
      <button id="undoButton" class="undo-btn">元に戻す</button>
    </div>
    <script type="module" src="/app.js"></script>
    <footer class="app-footer">
      <a href="/privacy.html" target="_blank">プライバシーポリシー</a>
    </footer>
  </body>
</html>
