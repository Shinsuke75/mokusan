<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#1d5a3c"/>
  <!-- leaf: eye shape rotated -45° = diagonal leaf -->
  <g transform="rotate(-45, 256, 256)">
    <path fill="white" d="M 116 256 Q 256 88 396 256 Q 256 424 116 256 Z"/>
  </g>
  <!-- center vein -->
  <g transform="rotate(-45, 256, 256)">
    <line x1="116" y1="256" x2="396" y2="256" stroke="#1d5a3c" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- stem -->
  <line x1="157" y1="355" x2="108" y2="425" stroke="white" stroke-width="26" stroke-linecap="round"/>
</svg>
